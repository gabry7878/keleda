<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Made by Stuporeh</title>
    <!-- Google Fonts: Outfit per corpo/testi, Syne per titoli/username per un look moderno e premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Cursore personalizzato avanzato (solo desktop) -->
    <div id="custom-cursor-dot" class="cursor-dot"></div>
    <div id="custom-cursor-ring" class="cursor-ring"></div>

    <div id="entry-screen" class="entry-screen">
        <div class="entry-content">
            <p class="entry-text">Click to enter</p>
        </div>
    </div>

    <div id="bg-container" class="bg-container">
        <video id="bg-video" autoplay loop muted playsinline class="bg-video"></video>
        <div class="bg-overlay"></div>
    </div>

    <div class="volume-panel glass-effect">
        <button id="mute-btn" class="mute-btn">
            <i class="fa-solid fa-volume-high"></i>
        </button>
        <div class="volume-slider-container">
            <input type="range" id="volume-slider" class="volume-slider" min="0" max="1" step="0.05" value="1">
        </div>
    </div>

    <main class="container">
        <div class="profile-card glass-effect tilt-element">
            <div class="avatar-container">
                <img src="" alt="Profile" class="avatar" id="profile-img">
                <div class="halo"></div>
            </div>
            
            <h1 class="username" id="username">Username</h1>
            
            <!-- Contenitore Badge in stile Discord -->
            <div class="profile-badges" id="badges-container"></div>
            
            <p class="bio" id="bio">La tua descrizione qui</p>

            <div class="social-links" id="social-container"></div>
        </div>

        <div class="music-card glass-effect tilt-element">
            <div class="cover-container">
                <img src="" alt="Cover" class="album-cover" id="album-cover">
                <div class="disc-hole"></div>
            </div>
            
            <div class="music-info">
                <h3 id="song-title">Titolo Canzone</h3>
                <div class="progress-container">
                    <span id="current-time">0:00</span>
                    <div class="slider-wrapper">
                        <input type="range" id="progress-bar" value="0" max="100">
                    </div>
                    <span id="total-time">0:00</span>
                </div>
            </div>

            <div class="music-controls">
                <div class="equalizer" id="equalizer">
                    <span class="eq-bar"></span>
                    <span class="eq-bar"></span>
                    <span class="eq-bar"></span>
                    <span class="eq-bar"></span>
                </div>
                <button id="play-pause-btn" class="play-btn">
                    <i class="fa-solid fa-play"></i>
                </button>
            </div>
        </div>
    </main>

    <audio id="bg-music" src="" loop></audio>

    <script src="script.js"></script>
    
    <div class="watermark">Made by Stuporeh</div>
</body>
</html>
